<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SICAU</title>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <!-- custom page styles -->
    <link rel="stylesheet" href="../assets/css/styleBody.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="../assets/css/styleLobby.css">

</head>

<body>

    <div class="header-wrapper">
        <div class="top-bar">
            <a href="http://www.pascualbravo.edu.co/" class="web-btn" target="_blank">
                Web Institucional
            </a>

            <div class="user-line">
                <span class="glyphicon glyphicon-user"></span>
                <span id="usuarioNombre"></span>
            </div>

            <div class="logout-line">
                <span class="glyphicon glyphicon-log-out"></span>
                <a href="../index.html">Cerrar sesión</a>
            </div>
        </div>

        <div class="logos-container">
            <img src="../assets/img/pascual_header.png" class="logo-pascual">
            <img src="../assets/img/sicauLogo.png" class="logo-sicau">
        </div>
    </div>

    <div class="nav-wrapper">
        <nav class="navbar navbar-inverse">
            <div class="container">
                <ul class="nav navbar-nav navCenter">
                    <li><a href="lobby.html">Inicio</a></li>
                    <li><a href="#">Estudiantes</a></li>
                    <li><a href="#">Extensión</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="bienvenida-wrapper">
        <div class="mensajeBienvenida">
            Hola Esneider, Bienvenido a SICAU!!!
        </div>

        <img src="../assets/img/gifSaludo.gif" class="gif-saludo">
    </div>

    <div id="myCarousel" class="carousel slide" data-ride="carousel">

        <ol class="carousel-indicators">
            <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
            <li data-target="#myCarousel" data-slide-to="1"></li>
            <li data-target="#myCarousel" data-slide-to="2"></li>
            <li data-target="#myCarousel" data-slide-to="3"></li>
            <li data-target="#myCarousel" data-slide-to="4"></li>
        </ol>

        <div class="carousel-inner">
            <div class="item active">
                <img src="../assets/img/BannerInstitucional-19.png">
            </div>
            <div class="item">
                <img src="../assets/img/BannerInstitucional-6.png">
            </div>
            <div class="item">
                <img src="../assets/img/BannerInstitucional-9.png">
            </div>
            <div class="item">
                <img src="../assets/img/BannerInstitucional-2.png">
            </div>
            <div class="item">
                <img src="../assets/img/BannerInstitucional-1.jpg">
            </div>
        </div>

        <a class="left carousel-control" href="#myCarousel" data-slide="prev">‹</a>
        <a class="right carousel-control" href="#myCarousel" data-slide="next">›</a>

    </div>

    <div class="buttons-wrapper">
        <button>QR DE INGRESO A LA INSTITUCIÓN</button>
        <button>ACTIVIDADES</button>
        <button>ENCUESTAS</button>
        <button>ACTIVAR PARQUEADERO</button>
    </div>

    <script src="../assets/js/scriptLobby.js"></script>

</body>

</html>
